spring:
  application:
    name: psychosim-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/psychosim}
    username: ${SPRING_DATASOURCE_USERNAME:psychosim}
    password: ${SPRING_DATASOURCE_PASSWORD:psychosim_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8090}

jwt:
  secret: ${JWT_SECRET:psychosim-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration-hours: ${JWT_EXPIRATION_HOURS:8}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.psychosim: INFO
    org.springframework.security: WARN
