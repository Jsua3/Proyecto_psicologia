<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Escena de simulacion psicologica universitaria</title>
  <desc id="desc">Sala privada de atencion con profesional, consultante, monitor de riesgo y ambiente institucional sereno.</desc>
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecf6f8"/>
      <stop offset="0.52" stop-color="#f6f8fc"/>
      <stop offset="1" stop-color="#e7e2f5"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dce9ee"/>
      <stop offset="1" stop-color="#edf4f6"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.84"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.46"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#24323A" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#wall)"/>
  <path d="M0 518 C220 492 422 504 640 532 C870 562 1058 542 1280 505 L1280 720 L0 720 Z" fill="url(#floor)"/>

  <rect x="82" y="70" width="320" height="210" rx="28" fill="url(#glass)" stroke="#4F7CAC" stroke-opacity=".18" filter="url(#softShadow)"/>
  <path d="M126 222 C174 157 227 183 260 137 C300 80 344 112 358 96" fill="none" stroke="#4FA3A5" stroke-width="10" stroke-linecap="round" opacity=".46"/>
  <circle cx="156" cy="148" r="18" fill="#A99BD6" opacity=".58"/>
  <circle cx="251" cy="164" r="15" fill="#8CBFA6" opacity=".68"/>
  <circle cx="322" cy="118" r="13" fill="#4F7CAC" opacity=".58"/>
  <text x="125" y="245" fill="#2F5F8F" font-family="Outfit, Arial" font-size="22" font-weight="700">Medidor de riesgo</text>

  <rect x="872" y="72" width="270" height="168" rx="26" fill="url(#glass)" stroke="#4F7CAC" stroke-opacity=".18"/>
  <text x="910" y="128" fill="#24323A" font-family="Outfit, Arial" font-size="24" font-weight="700">Objetivo</text>
  <text x="910" y="166" fill="#687A86" font-family="Outfit, Arial" font-size="18">Escuchar, valorar</text>
  <text x="910" y="194" fill="#687A86" font-family="Outfit, Arial" font-size="18">y proteger sin revictimizar.</text>

  <ellipse cx="646" cy="628" rx="360" ry="46" fill="#2F5F8F" opacity=".08"/>

  <g transform="translate(352 272)">
    <path d="M100 240 C62 210 48 158 68 113 C87 68 138 52 181 74 C220 94 238 141 227 183 C214 231 166 266 100 240Z" fill="#e9f4f2" stroke="#4F7CAC" stroke-opacity=".22" stroke-width="3"/>
    <circle cx="145" cy="90" r="50" fill="#d6b28d"/>
    <path d="M97 78 C116 25 183 28 200 79 C172 63 132 61 97 78Z" fill="#24323A"/>
    <path d="M96 135 C126 165 169 165 199 135 L211 254 L82 254 Z" fill="#4F7CAC"/>
    <path d="M112 154 C130 173 168 173 186 154" fill="none" stroke="#F4F7FA" stroke-width="10" stroke-linecap="round"/>
    <rect x="70" y="250" width="150" height="40" rx="20" fill="#2F5F8F" opacity=".18"/>
  </g>

  <g transform="translate(690 270)">
    <path d="M92 244 C52 214 41 159 62 115 C86 66 139 47 184 69 C229 91 244 148 222 194 C200 240 154 269 92 244Z" fill="#f5ecef" stroke="#A99BD6" stroke-opacity=".28" stroke-width="3"/>
    <circle cx="144" cy="93" r="48" fill="#c98f72"/>
    <path d="M97 94 C104 38 176 29 203 84 C181 70 135 70 97 94Z" fill="#4f2f31"/>
    <path d="M99 144 C124 167 166 169 194 144 L222 256 L73 256 Z" fill="#A99BD6"/>
    <path d="M114 158 C137 180 164 181 186 158" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity=".82"/>
    <rect x="63" y="250" width="170" height="40" rx="20" fill="#A99BD6" opacity=".18"/>
  </g>

  <g transform="translate(548 384)">
    <rect x="0" y="0" width="186" height="118" rx="26" fill="#ffffff" stroke="#4F7CAC" stroke-opacity=".16" filter="url(#softShadow)"/>
    <path d="M38 38 H148" stroke="#4FA3A5" stroke-width="10" stroke-linecap="round" opacity=".72"/>
    <path d="M38 68 H120" stroke="#A99BD6" stroke-width="10" stroke-linecap="round" opacity=".64"/>
  </g>
</svg>
